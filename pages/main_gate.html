<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Gate</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="app-shell detail-page">
      <h2>Main Gate</h2>
      <p class="subtitle">Welcome to the main entrance area.</p>
      <div class="image-container detail-image">
        <img src="../images/gate.jpeg" alt="Main Gate" usemap="#image-map" />
        <div
          class="location-marker"
          style="left: 440px; top: 440px"
          data-location="Location 1"
        ></div>
        <div class="location-label" style="left: 440px; top: 440px">
          Main Gate
        </div>
        <div
          class="location-marker"
          style="left: 700px; top: 400px"
          data-location="Location 1"
        ></div>
        <div class="location-label" style="left: 700px; top: 400px">
          Security Guard Post
        </div>
        <map name="image-map">
          <area
            shape="circle"
            coords="440,440,30"
            href="main_gate.html"
            alt="Main Gate"
            title="Main Gate"
          />
          <area
            shape="circle"
            coords="700,400,30"
            href="security.html"
            alt="Security Guard Post"
            title="Security Guard Post"
          />
        </map>
      </div>
      <a class="back-link" href="../index.html">← Back to Map</a>
    </main>
  </body>
</html>
